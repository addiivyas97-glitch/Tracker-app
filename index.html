<!DOCTYPE html>
<html>
<head>
    <title>Order Tracker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        input {
            font-size: 18px;
            padding: 10px;
            margin: 10px;
        }
        button {
            width: 80%;
            padding: 15px;
            margin: 5px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 10px;
        }
        .pack { background: #3498db; }
        .sent { background: #f39c12; }
        .done { background: #2ecc71; }
        .cancel { background: #e74c3c; }
    </style>
</head>
<body>

<h2>ORDER TRACKER</h2>

<input id="order_id" placeholder="Enter Order ID"><br>

<button class="pack" onclick="update('Packing')">📦 Packing</button>
<button class="sent" onclick="update('Sent')">🚚 Sent</button>
<button class="done" onclick="update('Done')">✅ Done</button>
<button class="cancel" onclick="update('Cancelled')">❌ Cancelled</button>

<h3>Orders</h3>
<ul id="list"></ul>

<script>
function update(status) {
    let id = document.getElementById("order_id").value;

    fetch("/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({order_id: id, status: status})
    }).then(() => load());
}

function load() {
    fetch("/get")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        for (let id in data) {
            let li = document.createElement("li");
            li.innerText = id + " - " + data[id].status + " (" + data[id].time + ")";
            list.appendChild(li);
        }
    });
}

setInterval(load, 3000);
</script>

</body>
</html>
