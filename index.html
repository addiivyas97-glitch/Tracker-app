<!DOCTYPE html>
<html>
<head>
<title>Tracker</title>

<style>
body { font-family: Arial; background:#f4f6f8; text-align:center; }

.box {
    background:white;
    width:350px;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, select {
    width:90%;
    padding:8px;
    margin:5px;
}

button {
    width:95%;
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.primary { background:#3498db; color:white; }
.green { background:#2ecc71; color:white; }
.gray { background:#7f8c8d; color:white; }

.order { background:#ecf0f1; margin:5px; padding:8px; border-radius:6px; }
.delay { background:#ffe6e6; color:red; }
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<div class="box">
<h2>Orders</h2>

<input id="oid" placeholder="Order ID">
<input id="loc" placeholder="Location">

<select id="status">
<option>Packing</option>
<option>Sent</option>
<option>In Transit</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>

<button class="primary" onclick="addOrder()">Add</button>
<button class="gray" onclick="updateOrder()">Update</button>

<hr>

<input id="search" placeholder="Search Order ID" onkeyup="loadOrders()">

<select id="filter" onchange="loadOrders()">
<option value="all">All</option>
<option value="pending">Pending</option>
<option value="delivered">Delivered</option>
</select>

<h3 id="stats"></h3>

<div id="orders"></div>
</div>

<script>
let currentUser="";

function login(){
    fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:user.value.trim(),
            password:pass.value.trim()
        })
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.success){
            currentUser=user.value;
            alert("Login success");
        } else alert("Wrong login");
    })
}

function addOrder(){
    fetch("/add_order",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
        order_id:oid.value,
        status:status.value,
        location:loc.value,
        user:currentUser
    })})
}

function updateOrder(){
    fetch("/update_order",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
        order_id:oid.value,
        status:status.value,
        location:loc.value,
        user:currentUser
    })})
}

function loadOrders(){
    fetch("/get_orders")
    .then(r=>r.json())
    .then(data=>{
        let html="";
        let searchVal = search.value.toLowerCase();
        let filterVal = filter.value;

        let total=0, delivered=0;

        data.forEach(o=>{
            if(searchVal && !o.order_id.toLowerCase().includes(searchVal)) return;

            if(filterVal==="pending" && o.status==="Delivered") return;
            if(filterVal==="delivered" && o.status!=="Delivered") return;

            total++;
            if(o.status==="Delivered") delivered++;

            let cls=o.delay?"order delay":"order";

            html+=`<div class="${cls}">
            <b>${o.order_id}</b><br>
            ${o.status} | ${o.location}<br>
            ${o.updated_by}
            </div>`;
        });

        stats.innerText=`Total: ${total} | Delivered: ${delivered}`;
        orders.innerHTML=html;
    })
}

setInterval(loadOrders,3000); // AUTO REFRESH
</script>

</body>
</html>
