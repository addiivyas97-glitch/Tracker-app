<!DOCTYPE html>
<html>
<head>
    <title>Tracker App</title>
</head>
<body>

<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Order Panel</h2>

<input id="oid" placeholder="Order ID"><br>
<input id="loc" placeholder="Location"><br>

<select id="status">
<option>Order Received</option>
<option>In Process</option>
<option>Shipped</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select><br><br>

<button onclick="addOrder()">Add</button>
<button onclick="updateOrder()">Update</button>
<button onclick="loadOrders()">Refresh</button>

<h3>Orders</h3>
<div id="orders"></div>

<script>
let currentUser = "";

function login(){
    fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:document.getElementById("user").value,
            password:document.getElementById("pass").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            currentUser = document.getElementById("user").value;
            alert("Login success");
        } else {
            alert("Wrong login");
        }
    })
}

function addOrder(){
    fetch("/add_order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            order_id:oid.value,
            status:status.value,
            location:loc.value,
            user:currentUser
        })
    }).then(()=>alert("Added"))
}

function updateOrder(){
    fetch("/update_order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            order_id:oid.value,
            status:status.value,
            location:loc.value,
            user:currentUser
        })
    }).then(()=>alert("Updated"))
}

function loadOrders(){
    fetch("/get_orders")
    .then(res=>res.json())
    .then(data=>{
        let html = "";
        data.forEach(o=>{
            let color = o.delay ? "red" : "green";
            html += `<p style="color:${color}">
            ${o.order_id} | ${o.status} | ${o.location} | ${o.updated_by}
            </p>`;
        })
        document.getElementById("orders").innerHTML = html;
    })
}
</script>

</body>
</html>
