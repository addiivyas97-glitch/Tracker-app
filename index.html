<!DOCTYPE html>
<html>
<head>
<title>Tracker</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#74ebd5,#9face6);
    margin:0;
}

.container {
    background:white;
    width:350px;
    margin:20px auto;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h3 { margin:10px 0; }

input, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.primary { background:#3498db; color:white; }
.secondary { background:#7f8c8d; color:white; }
.success { background:#2ecc71; color:white; }

.order {
    background:#f1f2f6;
    margin:6px 0;
    padding:10px;
    border-radius:8px;
}

.delay {
    background:#ffdddd;
    color:#c0392b;
    font-weight:bold;
}

.hidden { display:none; }

.dashboard {
    font-size:13px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<div class="container hidden" id="appBox">

<h3>Order Panel</h3>

<input id="oid" placeholder="Order ID">
<input id="loc" placeholder="Location">

<select id="status">
<option>Packing</option>
<option>Sent</option>
<option>In Transit</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>

<button id="addBtn" class="primary" onclick="addOrder()">Add</button>
<button class="secondary" onclick="updateOrder()">Update</button>

<hr>

<div class="dashboard" id="stats"></div>

<input id="search" placeholder="Search" onkeyup="loadOrders()">

<select id="filter" onchange="loadOrders()">
<option value="all">All</option>
<option value="pending">Pending</option>
<option value="delivered">Delivered</option>
<option value="delayed">Delayed</option>
</select>

<button class="success" onclick="downloadExcel()">Download Excel</button>

<div id="orders"></div>

</div>

<script>
let currentUser="";
let role="";

function login(){
    fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:user.value,
            password:pass.value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            currentUser=user.value;
            role=data.role;

            loginBox.classList.add("hidden");
            appBox.classList.remove("hidden");

            if(role!=="manager"){
                addBtn.style.display="none";
            }

            loadOrders();
        } else {
            alert("Wrong login");
        }
    })
}

function addOrder(){
    fetch("/add_order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            order_id:oid.value,
            status:status.value,
            location:loc.value,
            user:currentUser,
            role:role
        })
    }).then(res=>{
        if(res.status===403){
            alert("Not allowed");
        }
        loadOrders();
    })
}

function updateOrder(){
    fetch("/update_order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            order_id:oid.value,
            status:status.value,
            location:loc.value,
            user:currentUser
        })
    }).then(()=>loadOrders())
}

function loadOrders(){
    fetch("/get_orders")
    .then(res=>res.json())
    .then(data=>{

        let html="";
        let total=0,del=0,pend=0,delay=0;

        data.forEach(o=>{
            total++;
            if(o.status==="Delivered") del++; else pend++;
            if(o.delay) delay++;

            if(filter.value==="delivered" && o.status!=="Delivered") return;
            if(filter.value==="pending" && o.status==="Delivered") return;
            if(filter.value==="delayed" && !o.delay) return;
            if(!o.order_id.toLowerCase().includes(search.value.toLowerCase())) return;

            let cls=o.delay?"order delay":"order";

            html+=`<div class="${cls}">
            <b>${o.order_id}</b><br>
            ${o.status} | ${o.location}<br>
            ${o.updated_by}
            </div>`;
        });

        orders.innerHTML=html;
        stats.innerHTML=`Total:${total} | Delivered:${del} | Pending:${pend} | Delayed:${delay}`;
    })
}

setInterval(loadOrders,5000);

function downloadExcel(){
    fetch("/get_orders")
    .then(res=>res.json())
    .then(data=>{
        let csv="Order,Status,Location,User\n";
        data.forEach(o=>{
            csv+=`${o.order_id},${o.status},${o.location},${o.updated_by}\n`;
        });

        let blob=new Blob([csv]);
        let a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="orders.csv";
        a.click();
    })
}
</script>

</body>
</html>
