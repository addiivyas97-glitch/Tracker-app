<!-- index.html -->

<!DOCTYPE html>

<html>

<head>

<title>Order Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{

    margin:0;
    padding:0;
    font-family:Arial;
    background:#f3f4f6;

}

.header{

    background:#111827;
    color:white;
    text-align:center;
    padding:25px;

}

.container{

    max-width:500px;
    margin:auto;
    padding:15px;

}

.card{

    background:white;
    padding:18px;
    border-radius:12px;
    margin-top:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

input,select{

    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;

}

button{

    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;

}

.blue{

    background:#2563eb;
    color:white;

}

.green{

    background:#16a34a;
    color:white;

}

.orange{

    background:#ea580c;
    color:white;

}

.gray{

    background:#6b7280;
    color:white;

}

.hidden{

    display:none;

}

.stats{

    display:flex;
    gap:10px;

}

.statbox{

    flex:1;
    background:#dbeafe;
    padding:12px;
    border-radius:10px;
    text-align:center;

}

.order{

    background:#eef2ff;
    padding:12px;
    margin-top:10px;
    border-radius:10px;

}

.delay{

    background:#ffe4e6;
    border-left:5px solid red;

}

.small{

    font-size:13px;
    color:#555;

}

</style>

</head>

<body>

<div class="header">

    <h1>ORDER TRACKER</h1>

    <p>Manager & Operator System</p>

</div>

<div class="container">

    <!-- LOGIN -->

    <div class="card" id="loginCard">

        <h2>Login</h2>

        <input id="username" placeholder="Username">

        <input
        id="password"
        type="password"
        placeholder="Password">

        <button
        class="blue"
        onclick="login()">

        Login

        </button>

    </div>

    <!-- DASHBOARD -->

    <div class="card hidden" id="dashboardCard">

        <h2>Dashboard</h2>

        <div class="stats">

            <div class="statbox">

                <h3 id="totalOrders">0</h3>

                <p>Total</p>

            </div>

            <div class="statbox">

                <h3 id="pendingOrders">0</h3>

                <p>Pending</p>

            </div>

            <div class="statbox">

                <h3 id="deliveredOrders">0</h3>

                <p>Delivered</p>

            </div>

        </div>

    </div>

    <!-- OPERATOR PANEL -->

    <div class="card hidden" id="operatorPanel">

        <h2>Update Orders</h2>

        <input
        id="orderId"
        placeholder="Order ID">

        <input
        id="location"
        placeholder="Location">

        <select id="status">

            <option>Order Received</option>

            <option>In Transit</option>

            <option>Delivered</option>

        </select>

        <button
        class="green"
        onclick="addOrder()">

        Add Order

        </button>

        <button
        class="orange"
        onclick="updateOrder()">

        Update Order

        </button>

    </div>

    <!-- MANAGER FEATURES -->

    <div class="card hidden" id="managerPanel">

        <input
        id="search"
        placeholder="Search Order"
        onkeyup="loadOrders()">

        <select
        id="filter"
        onchange="loadOrders()">

            <option value="all">All</option>

            <option value="pending">Pending</option>

            <option value="delivered">Delivered</option>

        </select>

        <button
        class="gray"
        onclick="downloadReport()">

        Download Excel Report

        </button>

    </div>

    <!-- ORDERS -->

    <div class="card hidden" id="ordersCard">

        <h2>Orders</h2>

        <div id="orders"></div>

    </div>

</div>

<script>

let currentUser = "";
let currentRole = "";

function login(){

    fetch("/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            username:username.value.trim(),

            password:password.value.trim()

        })

    })

    .then(r=>r.json())

    .then(data=>{

        if(data.success){

            currentUser = username.value;

            currentRole = data.role;

            loginCard.classList.add("hidden");

            dashboardCard.classList.remove("hidden");

            operatorPanel.classList.remove("hidden");

            ordersCard.classList.remove("hidden");

            if(currentRole=="manager"){

                managerPanel.classList.remove("hidden");

            }

            loadOrders();

        }

        else{

            alert("Wrong Login");

        }

    })

}

function addOrder(){

    fetch("/add_order",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            order_id:orderId.value,

            location:location.value,

            status:status.value,

            updated_by:currentUser

        })

    })

    .then(()=>{

        loadOrders();

    })

}

function updateOrder(){

    fetch("/update_order",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            order_id:orderId.value,

            location:location.value,

            status:status.value,

            updated_by:currentUser

        })

    })

    .then(()=>{

        loadOrders();

    })

}

function downloadReport(){

    window.location="/download_report";

}

function loadOrders(){

    fetch("/get_orders")

    .then(r=>r.json())

    .then(data=>{

        let html = "";

        let total = data.length;

        let delivered = 0;

        let pending = 0;

        let searchValue = "";

        let filterValue = "all";

        if(currentRole=="manager"){

            searchValue =
            search.value.toLowerCase();

            filterValue =
            filter.value;

        }

        data.forEach(o=>{

            if(
            searchValue &&
            !o.order_id.toLowerCase().includes(searchValue)
            ){
                return;
            }

            if(
            filterValue=="pending" &&
            o.status=="Delivered"
            ){
                return;
            }

            if(
            filterValue=="delivered" &&
            o.status!="Delivered"
            ){
                return;
            }

            if(o.status=="Delivered"){
                delivered++;
            }
            else{
                pending++;
            }

            let cls = "order";

            if(o.delayed){

                cls += " delay";

            }

            html += `

            <div class="${cls}">

                <b>${o.order_id}</b><br>

                ${o.status}<br>

                ${o.location}<br>

                <span class="small">

                Updated By:
                ${o.updated_by}

                </span><br>

                <span class="small">

                Last Updated:
                ${o.last_updated}

                </span>

            </div>

            `;

        });

        orders.innerHTML = html;

        totalOrders.innerText = total;

        pendingOrders.innerText = pending;

        deliveredOrders.innerText = delivered;

    })

}

loadOrders();

setInterval(loadOrders, 180000);

</script>

</body>

</html>
