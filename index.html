<script>

let currentUser = "";
let currentRole = "";

function login(){

fetch("/login", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:document.getElementById("username").value,
password:document.getElementById("password").value

})

})

.then(response => response.json())

.then(data => {

if(data.success){

currentUser =
document.getElementById("username").value;

currentRole = data.role;

document.getElementById("loginCard")
.classList.add("hidden");

document.getElementById("operatorPanel")
.classList.remove("hidden");

document.getElementById("ordersCard")
.classList.remove("hidden");

if(currentRole === "manager"){

document.getElementById("managerPanel")
.classList.remove("hidden");

document.getElementById("dashboardCard")
.classList.remove("hidden");

document.getElementById("logsCard")
.classList.remove("hidden");

}

loadOrders();
loadLogs();

}

else{

alert("Wrong Login");

}

});

}

function addOrder(){

fetch("/add_order", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

order_id:
document.getElementById("orderId").value,

location:
document.getElementById("location").value,

status:
document.getElementById("status").value,

updated_by:currentUser

})

})

.then(() => {

loadOrders();
loadLogs();

});

}

function updateOrder(){

fetch("/update_order", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

order_id:
document.getElementById("orderId").value,

location:
document.getElementById("location").value,

status:
document.getElementById("status").value,

updated_by:currentUser

})

})

.then(() => {

loadOrders();
loadLogs();

});

}

function downloadReport(){

window.location = "/download_report";

}

function loadOrders(){

fetch("/get_orders")

.then(response => response.json())

.then(data => {

let html = "";

for(let i = 0; i < data.length; i++){

let o = data[i];

html +=
"<div class='order'>" +

"<b>" + o.order_id + "</b><br>" +

o.status + "<br>" +

o.location + "<br>" +

"Updated By: " + o.updated_by + "<br>" +

"Last Updated: " + o.last_updated +

"</div>";

}

document.getElementById("orders").innerHTML = html;

});

}

function loadLogs(){

if(currentRole !== "manager"){
return;
}

fetch("/get_logs")

.then(response => response.json())

.then(data => {

let html = "";

for(let i = 0; i < data.length; i++){

let log = data[i];

html +=
"<div class='log'>" +

"<b>" + log.operator_name + "</b><br>" +

log.action + "<br>" +

log.order_id + "<br>" +

log.time +

"</div>";

}

document.getElementById("logs").innerHTML = html;

});

}

setInterval(loadOrders, 180000);

</script>
