<!DOCTYPE html>
<html>

<head>

<title>Order Tracker Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#111827">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f4f6;
color:#111827;
transition:0.3s;
}

.dark{
background:#111827;
color:white;
}

.dark .card{
background:#1f2937;
color:white;
}

.dark input,
.dark select{
background:#374151;
color:white;
border:1px solid #555;
}

.dark .order{
background:#374151;
}

.header{
background:linear-gradient(
135deg,
#111827,
#1e3a8a
);

padding:30px;
text-align:center;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:18px;
box-shadow:0 4px 14px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
margin-top:10px;
}

.blue{
background:#2563eb;
color:white;
}

.green{
background:#16a34a;
color:white;
}

.orange{
background:#ea580c;
color:white;
}

.gray{
background:#6b7280;
color:white;
}

.hidden{
display:none;
}

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.statbox{
background:#dbeafe;
padding:20px;
border-radius:14px;
text-align:center;
}

.order{
background:#eef2ff;
padding:18px;
border-radius:14px;
margin-top:12px;
}

.delay{
background:#fee2e2;
border-left:6px solid red;
}

.status{
padding:6px 10px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-top:8px;
}

.delivered{
background:#dcfce7;
color:#166534;
}

.transit{
background:#fef3c7;
color:#92400e;
}

.pending{
background:#dbeafe;
color:#1d4ed8;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

a{
text-decoration:none;
color:#2563eb;
font-weight:500;
}

.dark a{
color:#60a5fa;
}

</style>

</head>

<body>

<div class="header">

<h1>ORDER TRACKER PRO</h1>

<p>Smart Logistics Management System</p>

</div>

<div class="container">

<button class="gray" onclick="toggleDarkMode()">

Toggle Dark Mode

</button>

<div class="card">

<h2>Track Your Order</h2>

<input id="trackInput" placeholder="Enter Order ID">

<button class="blue" onclick="trackOrder()">

Track Order

</button>

<div id="trackResult"></div>

</div>

<div class="card" id="loginCard">

<h2>Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button class="blue" onclick="login()">

Login

</button>

</div>

<div class="card hidden" id="dashboardCard">

<h2>Dashboard</h2>

<div class="stats">

<div class="statbox">
<h3 id="totalOrders">0</h3>
<p>Total Orders</p>
</div>

<div class="statbox">
<h3 id="pendingOrders">0</h3>
<p>Pending</p>
</div>

<div class="statbox">
<h3 id="deliveredOrders">0</h3>
<p>Delivered</p>
</div>

<div class="statbox">
<h3 id="delayedOrders">0</h3>
<p>Delayed</p>
</div>

</div>

</div>

<div class="card hidden" id="managerPanel">

<h2>Create Order</h2>

<input id="location" placeholder="Location">

<select id="assignedOperator">

<option>operator1</option>
<option>operator2</option>
<option>operator3</option>

</select>

<button class="green" onclick="createOrder()">

Create Order

</button>

<hr style="margin-top:20px;margin-bottom:20px;">

<h2>Manager Controls</h2>

<input id="search" placeholder="Search Order" onkeyup="loadOrders()">

<select id="filter" onchange="loadOrders()">

<option value="all">All Orders</option>
<option value="pending">Pending</option>
<option value="delivered">Delivered</option>

</select>

<div class="topbar">

<button class="gray" onclick="downloadReport()">

Excel Report

</button>

<button class="gray" onclick="downloadPDF()">

PDF Report

</button>

</div>

</div>

<div class="card hidden" id="operatorPanel">

<h2>Update Order</h2>

<input id="updateOrderId" placeholder="Order ID">

<input id="updateLocation" placeholder="Location">

<select id="updateStatus">

<option>Order Received</option>
<option>Packed</option>
<option>QC Checked</option>
<option>Dispatched</option>
<option>In Transit</option>
<option>Out For Delivery</option>
<option>Delivered</option>

</select>

<button class="orange" onclick="updateOrder()">

Update Order

</button>

</div>

<div class="card hidden" id="ordersCard">

<h2>Orders</h2>

<div id="orders"></div>

</div>

</div>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"/service-worker.js"
);

}

let currentUser = "";
let currentRole = "";

function toggleDarkMode(){

document.body.classList.toggle("dark");

}

function login(){

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

password:
document.getElementById("password").value

})

})

.then(response => response.json())

.then(data => {

if(data.success){

currentUser =
document.getElementById("username").value;

currentRole = data.role;

document.getElementById("loginCard")
.classList.add("hidden");

document.getElementById("ordersCard")
.classList.remove("hidden");

document.getElementById("operatorPanel")
.classList.remove("hidden");

if(
currentRole === "manager" ||
currentRole === "supervisor"
){

document.getElementById("dashboardCard")
.classList.remove("hidden");

document.getElementById("managerPanel")
.classList.remove("hidden");

}

loadOrders();

}

else{

alert("Wrong Login");

}

});

}

function createOrder(){

fetch("/create_order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

location:
document.getElementById("location").value,

assigned_operator:
document.getElementById("assignedOperator").value

})

})

.then(response => response.json())

.then(data => {

alert(
"Order Created: " +
data.order_id
);

loadOrders();

});

}

function updateOrder(){

fetch("/update_order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

order_id:
document.getElementById("updateOrderId").value,

location:
document.getElementById("updateLocation").value,

status:
document.getElementById("updateStatus").value,

updated_by:currentUser

})

})

.then(() => {

loadOrders();

});

}

function downloadReport(){

window.location="/download_report";

}

function downloadPDF(){

window.location="/download_pdf";

}

function trackOrder(){

fetch("/get_orders")

.then(response => response.json())

.then(data => {

let id =
document.getElementById("trackInput")
.value;

let found = null;

for(let i=0;i<data.length;i++){

if(data[i].order_id === id){

found = data[i];

}

}

if(found){

document.getElementById(
"trackResult"
).innerHTML =

"<div class='order'>" +

"<h3>" + found.order_id + "</h3>" +

"<div class='status transit'>" +
found.status +
"</div><br><br>" +

"Location: " +
found.location +
"<br><br>" +

"Last Updated: " +
found.last_updated +

"</div>";

}

else{

alert("Order Not Found");

}

});

}

function loadOrders(){

fetch("/get_orders")

.then(response => response.json())

.then(data => {

let html = "";

let total = data.length;
let pending = 0;
let delivered = 0;
let delayed = 0;

let searchValue = "";
let filterValue = "all";

if(
currentRole === "manager" ||
currentRole === "supervisor"
){

searchValue =
document.getElementById("search")
.value.toLowerCase();

filterValue =
document.getElementById("filter")
.value;

}

for(let i=0;i<data.length;i++){

let o = data[i];

if(currentRole === "operator"){

if(o.assigned_operator !== currentUser){

continue;

}

}

if(
searchValue &&
!o.order_id.toLowerCase()
.includes(searchValue)
){

continue;

}

if(
filterValue === "pending" &&
o.status === "Delivered"
){

continue;

}

if(
filterValue === "delivered" &&
o.status !== "Delivered"
){

continue;

}

if(o.status === "Delivered"){
delivered++;
}
else{
pending++;
}

if(o.delayed){
delayed++;
}

let cls = "order";

if(o.delayed){

cls += " delay";

}

let statusClass = "pending";

if(o.status === "Delivered"){
statusClass = "delivered";
}

if(
o.status === "In Transit" ||
o.status === "Out For Delivery"
){
statusClass = "transit";
}

html +=

"<div class='" + cls + "'>" +

"<h3>" + o.order_id + "</h3>" +

"Assigned To: " +
o.assigned_operator +
"<br><br>" +

"<div class='status " +
statusClass +
"'>" +

o.status +

"</div><br><br>" +

"Location: " +
o.location +
"<br><br>" +

"<span>" +

"Updated By: " +
o.updated_by +

"</span><br>" +

"<span>" +

"Last Updated: " +
o.last_updated +

"</span><br><br>" +

"<a href='/generate_qr/" +
o.order_id +
"'>QR Code</a><br>" +

"<a href='/generate_barcode/" +
o.order_id +
"'>Barcode</a><br>" +

"<a href='/download_pdf'>PDF</a>" +

"</div>";

}

document.getElementById(
"orders"
).innerHTML = html;

if(
currentRole === "manager" ||
currentRole === "supervisor"
){

document.getElementById(
"totalOrders"
).innerText = total;

document.getElementById(
"pendingOrders"
).innerText = pending;

document.getElementById(
"deliveredOrders"
).innerText = delivered;

document.getElementById(
"delayedOrders"
).innerText = delayed;

}

});

}

setInterval(loadOrders,10000);

</script>

</body>

</html>
